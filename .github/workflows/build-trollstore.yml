name: Build for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'  # Updated to newer version
          channel: stable
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build iOS
        run: flutter build ios --release --no-codesign
      
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r luci-trollstore.ipa Payload
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Luci-Mobile-TrollStore
          path: luci-trollstore.ipa
